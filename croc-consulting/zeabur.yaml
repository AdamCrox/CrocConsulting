# Zeabur Configuration for Croc Consulting
# This file auto-configures services and environment variables

services:
  # Frontend Service
  frontend:
    root: frontend
    type: docker
    ports:
      - 80
    env:
      REACT_APP_API_URL:
        default: "/api"
        description: "API URL prefix (use /api for nginx proxy)"
    
  # Backend Service  
  backend:
    root: backend
    type: docker
    ports:
      - 8000
    env:
      MONGODB_URI:
        link: mongodb
        description: "MongoDB connection string (auto-linked from MongoDB add-on)"
      DATABASE_NAME:
        default: "croc_consulting"
        description: "MongoDB database name"
      OPENAI_API_KEY:
        required: true
        description: "OpenAI API key for AI quote generation"
      ALLOWED_ORIGINS:
        required: true
        description: "Comma-separated list of allowed CORS origins (e.g., https://crocconsulting.com.au)"

# MongoDB Add-on
addons:
  mongodb:
    type: mongodb
