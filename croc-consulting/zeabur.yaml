# Zeabur Configuration for Croc Consulting
# Deploy: Connect GitHub repo, Zeabur auto-detects services

# Backend API Service
backend:
  source: ./backend
  type: dockerfile
  dockerfile: Dockerfile
  port: 8000
  env:
    MONGODB_URI:
      required: true
      description: "MongoDB connection URI (from Zeabur MongoDB addon)"
    DATABASE_NAME:
      default: "croc_consulting"
    OPENAI_API_KEY:
      required: true
      description: "OpenAI API key for AI quote generation"
    ALLOWED_ORIGINS:
      default: "*"
      description: "CORS allowed origins"

# Frontend Web Service
frontend:
  source: ./frontend
  type: dockerfile
  dockerfile: Dockerfile
  port: 80
  domain:
    - crocconsulting.zeabur.app
  env:
    REACT_APP_API_URL:
      default: "/api"
